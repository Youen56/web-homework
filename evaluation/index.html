<!DOCTYPE html>
<html>
<head>
    <title>YouChat-Youen's chat</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="index.css" />
    <script src="index.js"></script>
</head>
<body>

    <div id="login-overlay">
    <div style="text-align: center; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2>Connexion</h2>
        <input type="text" id="phoneId" placeholder="Numéro de téléphone (ID)" required><br><br>
        <input type="text" id="firstName" placeholder="Prénom (Obligatoire)" required><br><br>
        <input type="text" id="lastName" placeholder="Nom (Obligatoire)" required><br><br>
        <input type="text" id="pseudo" placeholder="Pseudo (Optionnel)"><br><br>
        <button onclick="login()" style="padding: 10px 20px; cursor: pointer; background: #128C7E; color: white; border: none; border-radius: 5px;">
            Commencer à discuter
        </button>
    </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">Mes Groupes <button onclick="promptNewGroup()" style="float:right">+</button></div>
        <div id="group-list"></div>
    </div>

    <div id="chat-area">
        <div class="chat-header" id="current-group-name">Sélectionnez un groupe</div>
        <div id="messages"></div>
        <form id="input-area" onsubmit="sendMessage(event)" style="visibility: hidden;">
            <input type="text" id="messageText" placeholder="Tapez un message...">
            <button type="submit">Envoyer</button>
        </form>
    </div>
</body>
</html>

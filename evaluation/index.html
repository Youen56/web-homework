<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Clone V2</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        #sidebar { width: 300px; background: #f0f2f5; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #edeff1; font-weight: bold; }
        #group-list { flex: 1; overflow-y: auto; }
        .group-item { padding: 15px; border-bottom: 1px solid #e9edef; cursor: pointer; transition: 0.3s; }
        .group-item:hover { background: #e9edef; }
        .group-item.active { background: #d9dbdd; border-left: 5px solid #128C7E; }
        .btn-join { background: #128C7E; color: white; border: none; border-radius: 3px; padding: 5px 8px; cursor: pointer; font-size: 0.8em; }
        .btn-leave { background: transparent; color: #cc0000; border: none; font-weight: bold; cursor: pointer; font-size: 1.2em; padding: 0 5px; opacity: 0.5; transition: 0.2s; }
        .btn-leave:hover { opacity: 1; color: red; }
        /* Main Chat Area */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .chat-header { padding: 15px; background: #edeff1; font-weight: bold; border-bottom: 1px solid #ddd; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        /* Bulles de message */
        .message { max-width: 70%; margin-bottom: 10px; padding: 10px; border-radius: 8px; position: relative; }
        .message.mine { align-self: flex-end; background: #dcf8c6; }
        .message.others { align-self: flex-start; background: white; }
        .sender { font-size: 0.8em; font-weight: bold; color: #128C7E; display: block; }
        .time { font-size: 0.7em; color: #999; float: right; margin-top: 5px; }

        #input-area { padding: 15px; background: #f0f2f5; display: flex; }
        #messageText { flex: 1; padding: 10px; border: none; border-radius: 20px; outline: none; }
        /* Login overlay */
        #login-overlay { position: fixed; inset: 0; background: white; z-index: 100; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
    <div style="text-align: center; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2>Connexion</h2>
        <input type="text" id="phoneId" placeholder="Numéro de téléphone (ID)" required><br><br>
        <input type="text" id="firstName" placeholder="Prénom (Obligatoire)" required><br><br>
        <input type="text" id="lastName" placeholder="Nom (Obligatoire)" required><br><br>
        <input type="text" id="pseudo" placeholder="Pseudo (Optionnel)"><br><br>
        <button onclick="login()" style="padding: 10px 20px; cursor: pointer; background: #128C7E; color: white; border: none; border-radius: 5px;">
            Commencer à discuter
        </button>
    </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">Mes Groupes <button onclick="promptNewGroup()" style="float:right">+</button></div>
        <div id="group-list"></div>
    </div>

    <div id="chat-area">
        <div class="chat-header" id="current-group-name">Sélectionnez un groupe</div>
        <div id="messages"></div>
        <form id="input-area" onsubmit="sendMessage(event)" style="visibility: hidden;">
            <input type="text" id="messageText" placeholder="Tapez un message...">
            <button type="submit">Envoyer</button>
        </form>
    </div>

    <script>
        let ws = null;
        let currentUser = { phone: '', name: '' };
        let currentGroupId = null;

        async function login() {
    const phone = document.getElementById("phoneId").value;
    const first = document.getElementById("firstName").value;
    const last = document.getElementById("lastName").value;
    const pseudo = document.getElementById("pseudo").value;

    // Validation des champs obligatoires
    if(!phone || !first || !last) {
        return alert("Le téléphone, le nom et le prénom sont obligatoires !");
    }

    currentUser.phone = phone;
    // On garde le nom d'affichage en mémoire côté client aussi pour les tests "mine/others"
    currentUser.name = pseudo.trim() !== "" ? pseudo : `${first} ${last}`;

    await fetch('http://localhost:8000/users/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            phone_number: phone, 
            first_name: first, 
            last_name: last,
            pseudo: pseudo 
        })
    });

    document.getElementById("login-overlay").style.display = "none";
    loadAllGroups(); // Ou loadUserGroups selon ta version
}

        // N'oublie pas de changer l'appel dans ta fonction login() :
        // Remplace loadUserGroups(); par loadGroupsUI(); à la fin de login()

        async function loadGroupsUI() {
            // 1. Récupérer TOUS les groupes du serveur
            const resAll = await fetch('http://localhost:8000/groups/');
            const allGroups = await resAll.json();

            // 2. Récupérer MES groupes
            const resMine = await fetch(`http://localhost:8000/users/${currentUser.phone}/groups`);
            const myGroups = await resMine.json();
            
            // Créer une liste simple d'IDs pour vérifier facilement l'appartenance
            const myGroupIds = myGroups.map(g => g.id);

            const listDiv = document.getElementById("group-list");
            listDiv.innerHTML = "";
            
            allGroups.forEach(g => {
                const isMember = myGroupIds.includes(g.id);
                const isActive = g.id === currentGroupId;

                const div = document.createElement("div");
                div.className = `group-item ${isActive ? 'active' : ''}`;
                div.style.display = "flex";
                div.style.justifyContent = "space-between";
                div.style.alignItems = "center";

                // Si je ne suis pas membre, le texte est un peu grisé
                const nameSpan = document.createElement("span");
                nameSpan.innerText = g.name;
                nameSpan.style.flex = "1";
                nameSpan.style.opacity = isMember ? "1" : "0.5";
                
                // On ne peut cliquer pour ouvrir le chat QUE si on est membre
                if (isMember) {
                    nameSpan.style.cursor = "pointer";
                    nameSpan.onclick = () => selectGroup(g.id, g.name);
                }

                // Le bouton d'action à droite (Rejoindre ou Quitter)
                const actionBtn = document.createElement("button");
                if (isMember) {
                    actionBtn.innerText = "✖"; // Petite croix pour quitter
                    actionBtn.className = "btn-leave";
                    actionBtn.title = "Quitter le groupe";
                    actionBtn.onclick = (e) => {
                        e.stopPropagation(); // Évite de déclencher le clic sur le groupe
                        leaveGroup(g.id);
                    };
                } else {
                    actionBtn.innerText = "Rejoindre";
                    actionBtn.className = "btn-join";
                    actionBtn.onclick = (e) => {
                        e.stopPropagation();
                        joinGroup(g.id);
                    };
                }

                div.appendChild(nameSpan);
                div.appendChild(actionBtn);
                listDiv.appendChild(div);
            });
        }

        async function joinGroup(groupId) {
            await fetch(`http://localhost:8000/groups/${groupId}/join/${currentUser.phone}`, { method: 'POST' });
            loadGroupsUI(); // Rafraîchit la liste
        }

        async function leaveGroup(groupId) {
            if(!confirm("Êtes-vous sûr de vouloir quitter ce groupe ?")) return;

            await fetch(`http://localhost:8000/groups/${groupId}/leave/${currentUser.phone}`, { method: 'DELETE' });
            
            // Si on quitte le groupe actuellement ouvert, on nettoie la zone de chat
            if (currentGroupId === groupId) {
                if (ws) ws.close();
                currentGroupId = null;
                document.getElementById("current-group-name").innerText = "Sélectionnez un groupe";
                document.getElementById("input-area").style.visibility = "hidden";
                document.getElementById("messages").innerHTML = "";
            }
            
            loadGroupsUI(); // Rafraîchit la liste
        }

        // --- Mise à jour de promptNewGroup pour utiliser la nouvelle interface ---
        async function promptNewGroup() {
            const name = prompt("Nom du nouveau salon public :");
            if(!name) return;

            const res = await fetch('http://localhost:8000/groups/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });
            const newGroup = await res.json();

            // Le créateur rejoint automatiquement
            await fetch(`http://localhost:8000/groups/${newGroup.id}/join/${currentUser.phone}`, { method: 'POST' });

            await loadGroupsUI();
            selectGroup(newGroup.id, newGroup.name);
        }

        async function selectGroup(groupId, groupName) {
            if (ws) ws.close();
            currentGroupId = groupId;

            document.getElementById("current-group-name").innerText = groupName;
            document.getElementById("input-area").style.visibility = "visible";
            document.getElementById("messages").innerHTML = "";

            loadGroupsUI(); // Met à jour la surbrillance active

            const historyRes = await fetch(`http://localhost:8000/groups/${groupId}/messages`);
            const history = await historyRes.json();
            history.forEach(msg => displayMessage(msg));

            ws = new WebSocket(`ws://localhost:8000/ws/chat/${groupId}/${currentUser.phone}`);
            ws.onmessage = (e) => displayMessage(JSON.parse(e.data));
        }

        async function promptNewGroup() {
            const id = prompt("ID du nouveau groupe :");
            const name = prompt("Nom du groupe :");
            if(!id || !name) return;

            // 1. Créer le groupe
            await fetch('http://localhost:8000/groups/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, name: name })
            });

            // 2. Rejoindre le groupe
            await fetch(`http://localhost:8000/groups/${id}/join/${currentUser.phone}`, { method: 'POST' });

            loadGroupsUI();
        }

        async function selectGroup(groupId, groupName) {
            if (ws) ws.close(); // Fermer l'ancienne connexion
            currentGroupId = groupId;

            document.getElementById("current-group-name").innerText = groupName;
            document.getElementById("input-area").style.visibility = "visible";
            document.getElementById("messages").innerHTML = ""; // Nettoyer l'écran

            // Mettre à jour l'UI de la sidebar
            loadGroupsUI();

            // Charger historique
            const historyRes = await fetch(`http://localhost:8000/groups/${groupId}/messages`);
            const history = await historyRes.json();
            history.forEach(msg => displayMessage(msg));

            // Nouveau WebSocket
            ws = new WebSocket(`ws://localhost:8000/ws/chat/${groupId}/${currentUser.phone}`);
            ws.onmessage = (e) => displayMessage(JSON.parse(e.data));
        }

        function displayMessage(data) {
            const messagesDiv = document.getElementById('messages');
            const isMine = data.sender.includes(currentUser.name);
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMine ? 'mine' : 'others'}`;
            msgDiv.innerHTML = `
                <span class="sender">${data.sender}</span>
                ${data.content}
                <span class="time">${new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
            `;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById("messageText");
            if(input.value && ws) {
                ws.send(input.value);
                input.value = "";
            }
        }
    </script>
</body>
</html>
